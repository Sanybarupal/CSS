<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Css Background Repeat</title>
    <link rel='stylesheet' href='style.css'>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.repeat { background-image: url('small.jpg'); background-repeat: repeat; height: 100px; }
.no-repeat { background-image: url('small.jpg'); background-repeat: no-repeat; height: 100px; }
</style>
</head>
<body>
    <h1>Css Background Repeat</h1>
    <div class='repeat'>Repeat</div>
    <div class='no-repeat'>No repeat</div>
</body>
</html>
