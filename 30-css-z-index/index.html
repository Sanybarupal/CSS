<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Css Z Index</title>
    <link rel='stylesheet' href='style.css'>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.box1 { position: absolute; z-index: 1; background: red; width: 100px; height: 100px; }
.box2 { position: absolute; z-index: 2; background: blue; width: 100px; height: 100px; left: 50px; top: 50px; }
</style>
</head>
<body>
    <h1>Css Z Index</h1>
    <div class='box1'>Box 1</div>
    <div class='box2'>Box 2</div>
</body>
</html>
