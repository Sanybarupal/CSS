<!DOCTYPE html>
<html lang='en'>
<head>

    <link rel='stylesheet' href='style.css'>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }

<body>
    <h1>Css Combinators</h1>
    <div>
        <p>Descendant</p>
        <p>Descendant</p>
    </div>
